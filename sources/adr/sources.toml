schema_version = 1
framework = "adr"
registry_kind = "reference_and_practice_sources"

[execution]
skill_path = "evolution.skill.md"
compiler = "skillsc"
compiled_format = "bpmn"
prototype_executor = "skillsx"
prototype_engine = "bpmn-engine"
target_engine = "qianji-bpmn-engine"
output_mode = "reviewable_diff_only"
runtime_policy_mutation_allowed = false
human_review_required = true

[[source]]
id = "adr-github-organization"
name = "ADR GitHub Organization"
url = "https://adr.github.io/"
type = "website"
cron = "0 0 1 * *"
enabled = true
entrypoints = [
  "/",
  "/adr-templates/",
  "/madr/",
]
authority = "canonical_reference"
notes = "Public ADR organization homepage and template index for lifecycle and structure review."

[[source]]
id = "joelparkerhenderson-architecture-decision-record"
name = "Joel Parker Henderson Architecture Decision Record"
url = "https://github.com/joelparkerhenderson/architecture-decision-record"
type = "github_repo"
cron = "0 0 15 * *"
enabled = true
entrypoints = [
  "/",
]
authority = "practice_reference"
notes = "Practice reference for ADR examples, templates, and decision-log conventions."
