id = "evergreen.connectivity-atomicity-diagnostic"
framework = "evergreen-notes"
query = "policies/evergreen/validation.sql"
issue_type = "Episteme_Evergreen_Violation"
renderer_owner = "Project Sentinel"

[xml]
root_element = "Issue"
file_element = "File"
target_element = "Target"
range_element = "ByteRange"
message_element = "Message"

[columns]
file_path = "file_path"
violation_type = "violation_type"
byte_start = "byte_start"
byte_end = "byte_end"
current_metric_name = "current_metric_name"
current_metric_value = "current_metric_value"

[[messages]]
violation_type = "EVERGREEN_ORPHAN"
message = "Note is topologically isolated. It has no detected incoming or outgoing references."
remediation_class = "relation_block_insert"

[[messages]]
violation_type = "EVERGREEN_BLOATED"
message = "Note exceeds the Evergreen atomicity line-count threshold."
remediation_class = "manual_review"
