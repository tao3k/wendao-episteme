id = "diataxis.kind-diagnostic"
framework = "diataxis"
query = "policies/diataxis/validation.sql"
issue_type = "Episteme_Diataxis_Violation"
renderer_owner = "Project Sentinel"

[xml]
root_element = "Issue"
file_element = "File"
target_element = "Target"
range_element = "ByteRange"
message_element = "Message"

[columns]
file_path = "file_path"
violation_type = "violation_type"
byte_start = "byte_start"
byte_end = "byte_end"
current_kind = "current_kind"

[[messages]]
violation_type = "INVALID_DOCUMENT_KIND"
message = "Ordinary document frontmatter kind is outside the Diátaxis document-kind ontology. Expected one of: tutorial, how-to, explanation, reference."
remediation_class = "metadata_patch"
