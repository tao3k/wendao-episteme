id = "diataxis.path-intent-diagnostic"
framework = "diataxis"
query = "policies/diataxis/path_validation.sql"
issue_type = "Episteme_Diataxis_Path_Conflict"
renderer_owner = "Project Sentinel"

[xml]
root_element = "Issue"
file_element = "File"
target_element = "Target"
range_element = "ByteRange"
message_element = "Message"

[columns]
file_path = "file_path"
violation_type = "violation_type"
byte_start = "byte_start"
byte_end = "byte_end"
current_intent = "current_intent"
path_pattern = "path_pattern"

[[messages]]
violation_type = "DIATAXIS_PATH_CONFLICT"
message = "Diátaxis intent conflicts with a project-local path rule."
remediation_class = "manual_review"
