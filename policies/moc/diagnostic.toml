id = "moc.navigation-hub-diagnostic"
framework = "moc"
query = "policies/moc/validation.sql"
issue_type = "Episteme_MOC_Structural_Anomaly"
renderer_owner = "Project Sentinel"

[xml]
root_element = "Issue"
file_element = "File"
target_element = "Target"
range_element = "ByteRange"
message_element = "Message"

[columns]
file_path = "file_path"
violation_type = "violation_type"
byte_start = "byte_start"
byte_end = "byte_end"
scope_id = "scope_id"
current_metric_name = "current_metric_name"
current_metric_value = "current_metric_value"

[[messages]]
violation_type = "MOC_REQUIRED_FOR_DENSITY"
message = "Dense knowledge scope has no declared MOC route hub."
remediation_class = "manual_review"

[[messages]]
violation_type = "MOC_EMPTY_HUB"
message = "MOC node has too few outgoing references to function as a route hub."
remediation_class = "moc_index_patch"
