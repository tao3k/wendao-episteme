[[source_evolution_skill_surfaces]]
id = "johnny-decimal.source-evolution"
framework = "johnny-decimal"
sources_path = "sources/johnny_decimal/sources.toml"
skill_path = "sources/johnny_decimal/evolution.skill.md"
compiler = "skillsc"
compiled_format = "bpmn"
prototype_executor = "skillsx"
prototype_engine = "bpmn-engine"
target_engine = "qianji-bpmn-engine"
execution_mode = "scheduled_review_flow"
output_mode = "reviewable_diff_only"
human_review_required = true
runtime_mutation_allowed = false
policy_write_allowed = false
service_task_implementation = "${environment.services.runAgent}"
extension_namespace = "http://skillsc.dev/bpmn/extensions"
extension_config = [
  "skillsc:prompt",
  "skillsc:tools",
  "skillsc:inputs",
  "skillsc:outputs",
]
supported_prototype_bpmn_elements = [
  "startEvent",
  "endEvent",
  "serviceTask",
  "exclusiveGateway",
  "parallelGateway",
  "boundaryEvent:errorEventDefinition",
  "sequenceFlow",
]
source_bpmn_elements_excluded_until_qianji_adapter = [
  "userTask",
  "manualTask",
]

