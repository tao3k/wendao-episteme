[[frameworks]]
id = "johnny-decimal"
name = "Johnny.Decimal"
kind = "topological_addressing"
authority_rank = 100
default_severity = "error"
owns = [
  "node.address",
  "collection.boundary",
  "canonical_path",
  "anchor.syntax",
]
conflict_strategy = "preserve_topological_identity"

[[frameworks]]
id = "adr"
name = "Architecture Decision Records"
kind = "decision_contract"
authority_rank = 90
default_severity = "error"
owns = [
  "decision.status",
  "decision.supersession",
  "decision.scope",
]
conflict_strategy = "preserve_recorded_decision_contract"

[[frameworks]]
id = "diataxis"
name = "Diátaxis"
kind = "intent_classification"
authority_rank = 70
default_severity = "warning"
owns = [
  "node.intent",
  "reader_task",
  "document_mode",
  "diataxis.closed_ontology",
]
conflict_strategy = "reclassify_intent_without_rewriting_identity"

[topology_manifest]
owner = "consumer_repository"
default_path = "topology.toml"
sync_command = "wendao episteme sync"
sync_mode = "skillsc_bpmn_review_flow"
sync_sources_path = "sources/topology/sources.toml"
sync_skill_path = "sources/topology/evolution.skill.md"
runtime_mutation_allowed = false
llm_runtime_mutation_allowed = false
category_identity_mutation_allowed = false
proposal_mode = "append_only"
agent_role = "Topology Architect Skill"
syntax_policy_owner = "wendao-episteme"
semantic_map_owner = "consumer_repository"
enactment = "git_commit"
allowed_proposal_operations = [
  "append_new_category",
  "append_new_subcategory",
  "add_unmapped_path_binding",
]
forbidden_proposal_operations = [
  "rename_existing_category",
  "renumber_existing_category",
  "delete_existing_category",
  "rewrite_existing_anchor_id",
  "move_existing_note",
]

