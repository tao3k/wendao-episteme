schema_version = 1
name = "wendao-episteme"
description = "Epistemological contracts for Wendao knowledge governance."

[policy]
default_conflict_resolution = "highest_authority_wins"
notes = "Identity and contract invariants outrank synthesis recommendations. Execution engines may compile these policies into their own validators."

[boundaries]
policy_owner = "wendao-episteme"
parser_substrate = "xiuxian-wendao-parsers"
audit_tooling = "Project Sentinel"
repair_tooling = "Project AnchoR v3"
diagnostic_renderer_owner = "Project Sentinel"
filesystem_writer_owner = "Project AnchoR v3"
allowed_source_artifacts = [
  "policy_contracts",
  "read_only_validation_queries",
  "anchor_v3_prompt_surfaces",
  "diagnostic_semantic_requirements",
  "source_registries",
  "skillsc_skill_surfaces",
]
source_artifact_exclusions = [
  "schemas",
  "ddl_sql",
  "parser_implementation",
  "rust_type_layout",
  "arrow_recordbatch_layout",
  "whole_document_rewrite_engine",
  "project_local_topology_manifest",
  "static_source_prompt",
  "runtime_topology_mutation",
]

[sql]
query_location = "policy_local_validation_sql"
statement_mode = "select_only"
execution_surface = "request_scoped"
mutation_allowed = false
ddl_allowed = false
schema_ownership = "wendao_engine"
type_ownership = "xiuxian-wendao-parsers"
public_catalogs = [
  "wendao_sql_tables",
  "wendao_sql_columns",
]
stable_views = [
  "repo_content_chunk",
  "repo_entity",
  "reference_occurrence",
]
optional_project_views = [
  "project_topology_category",
  "project_diataxis_path_rule",
]
forbidden_operations = [
  "CREATE",
  "ALTER",
  "DROP",
  "INSERT",
  "UPDATE",
  "DELETE",
  "MERGE",
  "COPY",
  "ATTACH",
]

[[policy_queries]]
id = "johnny-decimal.anchor-id-validation"
framework = "johnny-decimal"
path = "policies/johnny_decimal/validation.sql"
statement_mode = "select_only"
reads = [
  "repo_content_chunk",
  "wendao_sql_columns",
]
emits = [
  "file_path",
  "violation_type",
  "byte_start",
  "byte_end",
  "current_id",
]

[[policy_queries]]
id = "diataxis.intent-validation"
framework = "diataxis"
path = "policies/diataxis/validation.sql"
statement_mode = "select_only"
reads = [
  "repo_content_chunk",
  "wendao_sql_columns",
]
emits = [
  "file_path",
  "violation_type",
  "byte_start",
  "byte_end",
  "current_intent",
]

[[policy_queries]]
id = "diataxis.path-intent-validation"
framework = "diataxis"
path = "policies/diataxis/path_validation.sql"
statement_mode = "select_only"
requires_optional_view = "project_diataxis_path_rule"
reads = [
  "repo_content_chunk",
  "project_diataxis_path_rule",
  "wendao_sql_columns",
]
emits = [
  "file_path",
  "violation_type",
  "byte_start",
  "byte_end",
  "current_intent",
  "path_pattern",
]

[[policy_queries]]
id = "evergreen.connectivity-atomicity-validation"
framework = "evergreen-notes"
path = "policies/evergreen/validation.sql"
statement_mode = "select_only"
reads = [
  "repo_content_chunk",
  "reference_occurrence",
  "wendao_sql_columns",
]
emits = [
  "file_path",
  "violation_type",
  "byte_start",
  "byte_end",
  "current_metric_name",
  "current_metric_value",
]

[[policy_queries]]
id = "adr.state-reference-validation"
framework = "adr"
path = "policies/adr/validation.sql"
statement_mode = "select_only"
reads = [
  "repo_content_chunk",
  "reference_occurrence",
  "wendao_sql_columns",
]
emits = [
  "file_path",
  "violation_type",
  "byte_start",
  "byte_end",
  "target_adr_id",
  "target_adr_status",
  "replacement_adr_id",
]

[[diagnostic_mappings]]
id = "johnny-decimal.anchor-id-diagnostic"
framework = "johnny-decimal"
query = "johnny-decimal.anchor-id-validation"
path = "policies/johnny_decimal/diagnostic.toml"
issue_type = "Episteme_JohnnyDecimal_Violation"
renderer_owner = "Project Sentinel"

[[diagnostic_mappings]]
id = "diataxis.intent-diagnostic"
framework = "diataxis"
query = "diataxis.intent-validation"
path = "policies/diataxis/diagnostic.toml"
issue_type = "Episteme_Diataxis_Violation"
renderer_owner = "Project Sentinel"

[[diagnostic_mappings]]
id = "diataxis.path-intent-diagnostic"
framework = "diataxis"
query = "diataxis.path-intent-validation"
path = "policies/diataxis/path_diagnostic.toml"
issue_type = "Episteme_Diataxis_Path_Conflict"
renderer_owner = "Project Sentinel"

[[diagnostic_mappings]]
id = "evergreen.connectivity-atomicity-diagnostic"
framework = "evergreen-notes"
query = "evergreen.connectivity-atomicity-validation"
path = "policies/evergreen/diagnostic.toml"
issue_type = "Episteme_Evergreen_Violation"
renderer_owner = "Project Sentinel"

[[diagnostic_mappings]]
id = "adr.state-reference-diagnostic"
framework = "adr"
query = "adr.state-reference-validation"
path = "policies/adr/diagnostic.toml"
issue_type = "Episteme_ADR_Violation"
renderer_owner = "Project Sentinel"

[[repair_prompts]]
id = "johnny-decimal.fix-anchor-id"
framework = "johnny-decimal"
path = "prompts/anchor_v3_fixers/fix_jd_id.txt"
repair_tooling = "Project AnchoR v3"
write_mode = "byte_range_compare_and_swap"

[[repair_prompts]]
