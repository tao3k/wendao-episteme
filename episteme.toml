schema_version = 1
name = "wendao-episteme"
description = "Epistemological contracts for Wendao knowledge governance."

[policy]
default_conflict_resolution = "highest_authority_wins"
notes = "Identity and contract invariants outrank synthesis recommendations. Execution engines may compile these policies into their own validators."

[boundaries]
policy_owner = "wendao-episteme"
parser_substrate = "xiuxian-wendao-parsers"
audit_tooling = "Project Sentinel"
repair_tooling = "Project AnchoR v3"
diagnostic_renderer_owner = "Project Sentinel"
filesystem_writer_owner = "Project AnchoR v3"
allowed_source_artifacts = [
  "policy_contracts",
  "read_only_validation_queries",
  "anchor_v3_prompt_surfaces",
  "repair_guard_surfaces",
  "diagnostic_semantic_requirements",
  "source_registries",
  "skillsc_skill_surfaces",
]
source_artifact_exclusions = [
  "schemas",
  "ddl_sql",
  "parser_implementation",
  "rust_type_layout",
  "arrow_recordbatch_layout",
  "whole_document_rewrite_engine",
  "project_local_topology_manifest",
  "static_source_prompt",
  "runtime_topology_mutation",
]

[sql]
query_location = "policy_local_validation_sql"
statement_mode = "select_only"
execution_surface = "request_scoped"
mutation_allowed = false
ddl_allowed = false
schema_ownership = "wendao_engine"
type_ownership = "xiuxian-wendao-parsers"
public_catalogs = [
  "wendao_sql_tables",
  "wendao_sql_columns",
  "wendao_sql_view_sources",
]
stable_views = [
  "local_symbol",
  "repo_content_chunk",
  "repo_entity",
  "reference_occurrence",
]
optional_project_views = [
  "project_content_fingerprint",
  "project_topology_category",
  "project_diataxis_path_rule",
]
forbidden_operations = [
  "CREATE",
  "ALTER",
  "DROP",
  "INSERT",
  "UPDATE",
  "DELETE",
  "MERGE",
  "COPY",
  "ATTACH",
]

[[policy_queries]]
id = "johnny-decimal.anchor-id-validation"
framework = "johnny-decimal"
path = "policies/johnny_decimal/validation.sql"
statement_mode = "select_only"
reads = [
  "repo_content_chunk",
  "wendao_sql_columns",
]
emits = [
  "file_path",
  "violation_type",
  "byte_start",
  "byte_end",
  "current_id",
]

